<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Comandas MasterChester</title>

  <!-- TailwindCSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --theme-bg: #f5efe7;
      --theme-surface: #fffaf4;
      --theme-surface-2: #f9f1e8;
      --theme-border: rgba(122, 48, 18, 0.14);
      --theme-text: #241813;
      --theme-muted: #6f5a4d;
      --theme-primary: #e11d18;
      --theme-primary-dark: #b91c1c;
      --theme-accent: #d97706;
      --theme-accent-soft: rgba(217, 119, 6, 0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(225, 29, 24, 0.09), transparent 30%),
        radial-gradient(circle at top right, rgba(217, 119, 6, 0.09), transparent 26%),
        linear-gradient(180deg, #fbf5ee 0%, #f4eadf 100%);
      color: var(--theme-text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.4), transparent 24%),
        radial-gradient(circle at 50% 0%, rgba(225, 29, 24, 0.05), transparent 30%);
      z-index: 0;
    }

    nav,
    main {
      position: relative;
      z-index: 1;
    }

    nav {
      background: rgba(255, 250, 244, 0.88) !important;
      border-color: rgba(122, 48, 18, 0.12) !important;
      box-shadow: 0 8px 24px rgba(71, 32, 16, 0.08);
      backdrop-filter: blur(12px);
    }

    .page-transition {
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .nav-link {
      border-bottom: 2px solid transparent;
    }

    .nav-link.active {
      border-bottom-color: var(--theme-accent);
      color: var(--theme-accent);
    }

    .bg-white {
      background-color: var(--theme-surface) !important;
      color: var(--theme-text) !important;
    }

    .bg-slate-50 {
      background-color: #fbf4ec !important;
    }

    .bg-slate-100 {
      background-color: #f3e7dc !important;
    }

    .bg-slate-200 {
      background-color: #ead8ca !important;
    }

    .bg-slate-300 {
      background-color: #d7bdaa !important;
    }

    .bg-slate-800 {
      background-color: #4b3429 !important;
    }

    .bg-slate-900 {
      background-color: #2a1c16 !important;
    }

    .text-slate-900 {
      color: var(--theme-text) !important;
    }

    .text-slate-700 {
      color: #4f3c31 !important;
    }

    .text-slate-600 {
      color: var(--theme-muted) !important;
    }

    .text-slate-500 {
      color: #8a6f5f !important;
    }

    .text-slate-400 {
      color: #a58472 !important;
    }

    .border-slate-200 {
      border-color: var(--theme-border) !important;
    }

    .border-slate-300 {
      border-color: rgba(122, 48, 18, 0.22) !important;
    }

    .bg-blue-600,
    .bg-blue-700 {
      background-color: var(--theme-primary) !important;
    }

    .hover\:bg-blue-700:hover {
      background-color: var(--theme-primary-dark) !important;
    }

    .text-blue-600,
    .text-blue-700,
    .text-blue-800 {
      color: var(--theme-accent) !important;
    }

    .bg-blue-50,
    .bg-blue-100 {
      background-color: var(--theme-accent-soft) !important;
    }

    .border-blue-400 {
      border-color: rgba(217, 119, 6, 0.48) !important;
    }

    .hover\:bg-blue-50:hover {
      background-color: rgba(217, 119, 6, 0.14) !important;
    }

    .bg-green-600,
    .bg-green-700 {
      background-color: #15803d !important;
    }

    .hover\:bg-green-700:hover {
      background-color: #166534 !important;
    }

    .text-green-600,
    .text-green-700,
    .text-green-800 {
      color: #15803d !important;
    }

    .bg-green-50,
    .bg-green-100 {
      background-color: rgba(21, 128, 61, 0.08) !important;
    }

    .bg-orange-50,
    .bg-orange-100 {
      background-color: rgba(217, 119, 6, 0.1) !important;
    }

    .text-orange-600 {
      color: #c2410c !important;
    }

    .border-orange-200 {
      border-color: rgba(194, 65, 12, 0.18) !important;
    }

    .hover\:bg-slate-50:hover {
      background-color: #f7efe5 !important;
    }

    .hover\:bg-slate-200:hover {
      background-color: #ead8ca !important;
    }

    .hover\:bg-slate-300:hover {
      background-color: #d8bea9 !important;
    }

    .hover\:text-slate-900:hover {
      color: var(--theme-text) !important;
    }

    .shadow-md,
    .shadow-lg,
    .shadow-xl {
      box-shadow: 0 10px 28px rgba(71, 32, 16, 0.08) !important;
    }
  </style>
</head>

<body class="bg-slate-50">
  <!-- Navigation -->
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-slate-900">MasterChester</h1>
        <div class="flex gap-6">
          <a href="#/" class="nav-link py-2 px-3 text-sm font-medium text-slate-600 hover:text-slate-900 transition"
            data-page="/">Mesas</a>
          <a href="#/cardapio"
            class="nav-link py-2 px-3 text-sm font-medium text-slate-600 hover:text-slate-900 transition"
            data-page="/cardapio">Cardápio</a>
          <a href="#/historico"
            class="nav-link py-2 px-3 text-sm font-medium text-slate-600 hover:text-slate-900 transition"
            data-page="/historico">Histórico</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="app" class="page-transition"></div>
  </main>

  <!-- Scripts -->
  <script src="js/customMenu.js"></script>
  <script src="js/data.js"></script>
  <script src="js/pages/tables.js"></script>
  <script src="js/pages/menu.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/pages/table-detail.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
