<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Comandas Restaurante</title>

  <!-- TailwindCSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .page-transition {
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .nav-link.active {
      @apply border-b-2 border-blue-600 text-blue-600;
    }
  </style>
</head>

<body class="bg-slate-50">
  <!-- Navigation -->
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-slate-900">Master Chestes</h1>
        <div class="flex gap-6">
          <a href="#/" class="nav-link py-2 px-3 text-sm font-medium text-slate-600 hover:text-slate-900 transition"
            data-page="/">Mesas</a>
          <a href="#/cardapio"
            class="nav-link py-2 px-3 text-sm font-medium text-slate-600 hover:text-slate-900 transition"
            data-page="/cardapio">Cardápio</a>
          <a href="#/historico"
            class="nav-link py-2 px-3 text-sm font-medium text-slate-600 hover:text-slate-900 transition"
            data-page="/historico">Histórico</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="app" class="page-transition"></div>
  </main>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/pages/tables.js"></script>
  <script src="js/pages/menu.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/pages/table-detail.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
